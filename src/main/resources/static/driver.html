<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Available Parking Lots</title>
    <!-- Include Bootstrap for quick card styling -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container py-4">
    <h1 class="mb-4">Available Parking Lots</h1>
    <div class="row">
        <div class="col-md-4 mb-3" th:each="lot : ${parkingLots}">
            <div class="card shadow-sm">
                <div class="card-body">
                    <h5 class="card-title" th:text="${lot.name}">Parking Name</h5>
                    <h6 class="card-subtitle mb-2 text-muted">
                        <a th:href="'https://maps.google.com/?q=' + ${lot.location}" target="_blank"
                           th:text="${lot.location}">Location</a>
                    </h6>
                    <p class="card-text">
                        <strong>Spots:</strong> <span th:text="${lot.spots}">0</span><br>
                        <strong>Price:</strong> $<span th:text="${lot.price}">0.00</span>/hr
                    </p>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>

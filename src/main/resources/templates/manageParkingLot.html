<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Manage Parking Lot</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background-color: #f3fff3;
            font-family: Arial, sans-serif;
        }
        .container {
            max-width: 700px;
            margin-top: 40px;
            background: #ffffff;
            padding: 30px;
            border-radius: 12px;
            border: 1px solid #b2d8b2;
            box-shadow: 0 3px 10px rgba(0,0,0,0.08);
        }
        h2 {
            text-align: center;
            color: #2f5f2f;
            margin-bottom: 25px;
        }
        button {
            background-color: #4caf50;
            border: none;
        }
        button:hover {
            background-color: #449d48;
        }
    </style>
</head>

<body>
<div class="container">
        <div style="text-align: right; margin-bottom: 10px;">
            <a href="/login" class="btn btn-danger">Logout</a>
        </div>
    <h2>Manage Parking Lot</h2>

    <div th:if="${successMessage}" class="alert alert-success alert-dismissible fade show" role="alert">
        <span th:text="${successMessage}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
    </div>

    <div th:if="${errorMessage}" class="alert alert-danger alert-dismissible fade show" role="alert">
        <span th:text="${errorMessage}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
    </div>

    <form th:action="@{/parkinglot}" th:object="${parkingLot}" method="post">

        <!-- Hidden ID -->
        <input type="hidden" th:field="*{id}"/>
        <input type="hidden" th:field="*{managerId}"/>
        <input type="hidden" th:field="*{latitude}"/>
        <input type="hidden" th:field="*{longitude}"/>
        <input type="hidden" th:field="*{location}"/>

        <div class="mb-3">
            <label class="form-label">Parking Lot Name</label>
            <input class="form-control" th:field="*{name}" required>
        </div>

        <div class="mb-3">
            <label class="form-label">Total Spots</label>
            <input type="number" min="0" class="form-control" th:field="*{spots}" required>
        </div>

        <div class="mb-3">
            <label class="form-label">Free Spots</label>
            <input type="number" min="0" class="form-control" th:field="*{freeSpots}" required>
        </div>

        <div class="mb-3">
            <label class="form-label">Price per Hour (RON)</label>
            <input type="number" step="0.01" min="0" class="form-control" th:field="*{price}" required>
        </div>

        <button class="btn btn-success w-100 mt-3" type="submit">Update Parking Lot</button>
    </form>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>

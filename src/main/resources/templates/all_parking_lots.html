<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Available Parking Lots</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background-color: #f3fff3;
            font-family: Arial, sans-serif;
        }

        .page-header {
            text-align: center;
            margin-top: 40px;
            margin-bottom: 40px;
        }

        .page-header h1 {
            color: #3a7f3a;
            font-weight: bold;
        }

        .card {
            border: 1px solid #b2d8b2;
            border-radius: 12px;
            padding: 10px;
        }

        .card-body {
            padding: 20px;
        }

        .card-title {
            color: #2f5f2f;
            font-size: 1.4rem;
            font-weight: bold;
        }

        .card-subtitle a {
            text-decoration: none;
            color: #3a7f3a;
        }

        .card-subtitle a:hover {
            text-decoration: underline;
        }

        .container {
            max-width: 1300px;
        }
    </style>

</head>
<body>

<div class="container py-4">

    <div class="page-header">
        <h1>Available Parking Lots</h1>
    </div>

    <div class="row g-4 justify-content-center">
        <div class="col-md-5 col-lg-4" th:each="lot : ${parkingLots}">
            <div class="card shadow-sm">
                <div class="card-body">
                    <h5 class="card-title" th:text="${lot.name}">Parking Name</h5>

                    <p class="card-text">
                        <a th:href="${lot.location}" target="_blank"
                           th:text="${lot.location}">Location</a><br>
                        <strong>Total spots:</strong>
                        <span th:text="${lot.spots}">0</span><br>

                        <strong>Free spots:</strong>
                        <span th:text="${lot.freeSpots}">0</span><br>

                        <strong>Price:</strong>
                        RON <span th:text="${lot.price}">0.00</span>/hr
                    </p>
                </div>
            </div>
        </div>
    </div>

</div>

</body>
</html>

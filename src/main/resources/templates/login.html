<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Login</title>

    <style>
        body {
            background-color: #f3fff3;
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            background: #ffffff;
            padding: 25px 35px;
            border-radius: 10px;
            border: 1px solid #b2d8b2;
            box-shadow: 0 3px 10px rgba(0,0,0,0.08);
            text-align: center;
        }
        h1 {
            color: #3a7f3a;
            margin-bottom: 20px;
        }
        input[type="text"],
        input[type="password"] {
            width: 100%;
            padding: 10px;
            margin-top: 8px;
            border-radius: 6px;
            border: 1px solid #b5d6b5;
        }
        button {
            margin-top: 15px;
            padding: 10px 18px;
            background-color: #4caf50;
            border: none;
            border-radius: 6px;
            color: white;
            cursor: pointer;
        }
        button:hover {
            background-color: #449d48;
        }
        .error {
            color: red;
            margin-bottom: 10px;
        }
    </style>

</head>
<body>

<div style="display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; gap: 20px;">

    <h1 style="color: #3a7f3a;">Centralized Parking System</h1>

    <div class="container">
        <h2>Log In</h2>

    <div th:if="${loginError}" class="error">
        <p th:text="${loginError}"></p>
    </div>

    <form th:action="@{/login}" th:object="${user}" method="post">
        <div>
            <label for="username">Username:</label>
            <input id="username" type="text" th:field="*{username}" required />
        </div>

        <div>
            <label for="password">Password:</label>
            <input id="password" type="password" th:field="*{password}" required />
        </div>

        <button type="submit">Login</button>
    </form>

    <p style="margin-top: 15px;">
        Don't have an account?
        <a th:href="@{/signup}">Sign up</a>
    </p>

</div>
</div>

</body>
</html>
